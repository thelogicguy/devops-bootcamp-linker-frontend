name: Docker Build, Scan, and Push

# Workflow is pushed to main branch and manually triggered via workflow_dispatch. 
# Markdown files and workflow files are ignored to prevent unnecessary runs.

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths-ignore:
            - '**/*.md'
            - '.github/workflows/**'


env: 
    DOCKER_REPO: thelogicguy
    IMAGE_NAME: devopsbootcamp-frontend
    NEXT_PUBLIC_API_URL: "http://thelogicguy-leap.xyz/api"


jobs:
    slack-notify:
        runs-on: ubuntu-latest
        steps:
            - name: Slack Notification
              uses: rtCamp/action-slack-notify@v2.3.3
              env:
                SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                SLACK_TITLE: Docker Build Pipeline Triggered
                SLACK_MESSAGE: |
                    **Event:** ${{ github.event_name }}

                    **Actor:** ${{ github.actor }}

                    **Branch:** ${{ github.ref_name }}

                    **Commit:** ${{ github.event.head_commit.message }}

    build-scan-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            # Checkout the repository to access the Dockerfile and application code

            - name: Checkout application repository
              uses: actions/checkout@v5

            # Setup Docker Buildx for advanced build capabilities

            - name: Setup Docker
              uses: docker/setup-buildx-action@v3

            # Login to Docker Hub using credentials stored in GitHub Secrets

            - name: Login in Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            # Generate a unique Docker image tag based on the commit SHA to ensure traceability

            - name: Generate Docker Image Tag
              id: tag
              uses: docker/metadata-action@v6
              with:
                images: docker.io/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}
                tags: |
                    type=sha,format=short

            # Build the Docker image using the generated tag and pass necessary build arguments for the application

            - name: Build Docker Image
              uses: docker/build-push-action@v7
              with:
                context: .
                load: true
                tags: ${{ steps.tag.outputs.tags }}
                build-args: |
                    NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            
            # Install Trivy, a vulnerability scanner for container images, 
            # to ensure the built image is secure before pushing to Docker Hub

            - name: Install Trivy
              run: |
                curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin

            # Scan the built Docker image for vulnerabilities, focusing on critical and high severity issues, and generate a report.

            - name: Scan Docker Image for Vulnerabilities
              run: |
                trivy image \
                --format table \
                --exit-code 1 \
                --ignore-unfixed \
                --severity CRITICAL,HIGH \
                "${{ steps.tag.outputs.tags }}" \
                | tee trivy-report.txt
            
            # Upload the Trivy scan report as an artifact, regardless of the scan outcome, to allow for later review and analysis.

            - name: Upload Scan Report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                name: trivy-report
                path: trivy-report.txt
            
            # Push the Docker image to Docker Hub only if the vulnerability scan passes, 
            # ensuring that only secure images are published.

            - name: Push Image to Docker Hub
              uses: docker/build-push-action@v7
              with:
                context: .
                push: true
                tags: ${{ steps.tag.outputs.tags }}

            # Send a Slack notification with the final status of the job, 
            # including details about the actor, repository, and a link to the logs for easy access and monitoring. 
            # This step runs regardless of the job outcome to ensure visibility into the pipeline execution.

            - name: Slack Notification
              if: always()
              uses: rtCamp/action-slack-notify@v2.3.3
              env:
                SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                SLACK_COLOR: ${{ job.status }}
                SLACK_MESSAGE: |
                    Docker pipeline *${{ job.status }}*

                    Actor: ${{ github.actor }}

                    Repository: ${{ github.repository }}

                    Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
